<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Site Analysis{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background:#f4f5f7;font-family:Arial,Helvetica,sans-serif;color:#1a1a1a;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f5f7;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0"
               style="background:#ffffff;border-radius:8px;overflow:hidden;">
          <tr>
            <td style="background:#0f172a;padding:20px 32px;color:#ffffff;font-size:18px;font-weight:bold;">
              Site Analysis
            </td>
          </tr>
          <tr>
            <td style="padding:32px;font-size:15px;line-height:1.6;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <tr>
            <td style="padding:20px 32px;background:#f8fafc;color:#64748b;font-size:12px;">
              You received this email because an action was requested for your
              Site Analysis account. If this wasn't you, you can safely ignore it.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
