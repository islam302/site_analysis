components:
  schemas:
    AdminUser:
      type: object
      description: User representation for admins, including the user's API key.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        username:
          type: string
          readOnly: true
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
        email:
          type: string
          format: email
          readOnly: true
          title: Email address
        first_name:
          type: string
          readOnly: true
        last_name:
          type: string
          readOnly: true
        full_name:
          type: string
          readOnly: true
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
          title: Active
          description: Inactive accounts cannot authenticate.
        is_staff:
          type: boolean
          readOnly: true
          title: Staff status
        is_email_verified:
          type: boolean
          readOnly: true
          title: Email verified
        api_key:
          allOf:
          - $ref: '#/components/schemas/ApiKey'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - api_key
      - created_at
      - email
      - first_name
      - full_name
      - id
      - is_active
      - is_email_verified
      - is_staff
      - last_name
      - role
      - username
    AnalysisHistory:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        url:
          type: string
          format: uri
          readOnly: true
        reports_count:
          type: integer
          readOnly: true
        last_analyzed_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - id
      - last_analyzed_at
      - reports_count
      - url
    AnalysisReport:
      type: object
      description: Full report detail (includes raw_response).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        url:
          type: string
          format: uri
          readOnly: true
        strategy:
          allOf:
          - $ref: '#/components/schemas/StrategyEnum'
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/ReportStatusEnum'
          readOnly: true
        error_message:
          type: string
          readOnly: true
        performance_score:
          type: integer
          readOnly: true
          nullable: true
        accessibility_score:
          type: integer
          readOnly: true
          nullable: true
        best_practices_score:
          type: integer
          readOnly: true
          nullable: true
        seo_score:
          type: integer
          readOnly: true
          nullable: true
        first_contentful_paint:
          type: number
          format: double
          readOnly: true
          nullable: true
          description: seconds
        largest_contentful_paint:
          type: number
          format: double
          readOnly: true
          nullable: true
          description: seconds
        total_blocking_time:
          type: number
          format: double
          readOnly: true
          nullable: true
          description: milliseconds
        cumulative_layout_shift:
          type: number
          format: double
          readOnly: true
          nullable: true
          description: unitless
        speed_index:
          type: number
          format: double
          readOnly: true
          nullable: true
          description: seconds
        time_to_interactive:
          type: number
          format: double
          readOnly: true
          nullable: true
          description: seconds
        raw_response:
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - accessibility_score
      - best_practices_score
      - created_at
      - cumulative_layout_shift
      - error_message
      - first_contentful_paint
      - id
      - largest_contentful_paint
      - performance_score
      - raw_response
      - seo_score
      - speed_index
      - status
      - strategy
      - time_to_interactive
      - total_blocking_time
      - updated_at
      - url
    AnalysisReportList:
      type: object
      description: Compact report representation for list endpoints (no raw_response).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        url:
          type: string
          format: uri
          readOnly: true
        strategy:
          allOf:
          - $ref: '#/components/schemas/StrategyEnum'
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/ReportStatusEnum'
          readOnly: true
        performance_score:
          type: integer
          readOnly: true
          nullable: true
        accessibility_score:
          type: integer
          readOnly: true
          nullable: true
        best_practices_score:
          type: integer
          readOnly: true
          nullable: true
        seo_score:
          type: integer
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - accessibility_score
      - best_practices_score
      - created_at
      - id
      - performance_score
      - seo_score
      - status
      - strategy
      - url
    AnalyzeInputRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
          minLength: 1
          maxLength: 2048
        strategy:
          allOf:
          - $ref: '#/components/schemas/StrategyEnum'
          default: mobile
      required:
      - url
    ApiKey:
      type: object
      description: Full API key — returned to the key's owner and to admins.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        key:
          type: string
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
        last_used_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - is_active
      - key
      - last_used_at
    Audit:
      type: object
      description: Full audit detail including nested issues.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        url:
          type: string
          format: uri
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/ReportStatusEnum'
          readOnly: true
        total_errors:
          type: integer
          readOnly: true
        total_alerts:
          type: integer
          readOnly: true
        total_features:
          type: integer
          readOnly: true
        total_structural:
          type: integer
          readOnly: true
        total_contrast_errors:
          type: integer
          readOnly: true
        wcag_level:
          type: string
          readOnly: true
          nullable: true
          description: 'Estimated WCAG conformance: A / AA / AAA, or null if it fails.'
        credits_consumed:
          type: integer
          readOnly: true
        error_message:
          type: string
          readOnly: true
        issues:
          type: array
          items:
            $ref: '#/components/schemas/AuditIssue'
          readOnly: true
        raw_response:
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - credits_consumed
      - error_message
      - id
      - issues
      - raw_response
      - status
      - total_alerts
      - total_contrast_errors
      - total_errors
      - total_features
      - total_structural
      - updated_at
      - url
      - wcag_level
    AuditIssue:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        issue_type:
          allOf:
          - $ref: '#/components/schemas/IssueTypeEnum'
          readOnly: true
        wave_id:
          type: string
          readOnly: true
          description: WAVE item id, e.g. 'alt_missing'.
        description:
          type: string
          readOnly: true
        count:
