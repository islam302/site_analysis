openapi: 3.0.3
info:
  title: Site Analysis API
  version: 1.0.0
  description: 'Multi-tool website analysis platform: Google PageSpeed, GTmetrix,
    a combined speed test, and WAVE accessibility audits — with JWT + API-key auth
    and a credit/quota system.'
paths:
  /api/v1/audits/:
    get:
      operationId: audits_list
      description: |-
        List / retrieve / soft-delete accessibility audits.

        Detail (retrieve) is public by UUID so anonymous submitters can fetch their
        audit; list/delete are scoped to the authenticated owner.
      parameters:
      - in: query
        name: created_after
        schema:
          type: string
          format: date-time
      - in: query
        name: created_before
        schema:
          type: string
          format: date-time
      - in: query
        name: max_errors
        schema:
          type: integer
      - in: query
        name: min_errors
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: string
          enum:
          - completed
          - failed
          - pending
        description: |-
          * `pending` - Pending
          * `completed` - Completed
          * `failed` - Failed
      - in: query
        name: url
        schema:
          type: string
      - in: query
        name: wcag_level
        schema:
          type: string
      tags:
      - audits
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditListList'
          description: ''
  /api/v1/audits/{id}/:
    get:
      operationId: audits_retrieve
      description: |-
        List / retrieve / soft-delete accessibility audits.

        Detail (retrieve) is public by UUID so anonymous submitters can fetch their
        audit; list/delete are scoped to the authenticated owner.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this accessibility audit.
        required: true
      tags:
      - audits
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Audit'
          description: ''
    delete:
      operationId: audits_destroy
      description: |-
        List / retrieve / soft-delete accessibility audits.

        Detail (retrieve) is public by UUID so anonymous submitters can fetch their
        audit; list/delete are scoped to the authenticated owner.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this accessibility audit.
        required: true
      tags:
      - audits
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '204':
          description: No response body
  /api/v1/audits/{id}/issues/:
    get:
      operationId: audits_issues_list
      description: GET /audits/{id}/issues/ — issues for one audit (filter by issue_type).
      summary: List issues for an audit
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - audits
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditIssue'
          description: ''
  /api/v1/audits/run/:
    post:
      operationId: audits_run_create
      description: |-
        POST /audits/run/ — run a WAVE accessibility audit.

        Public: authenticated users are credit-gated (1 credit); anonymous users run
        without credits.
      summary: Run an accessibility audit
      tags:
      - audits
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunAuditInputRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RunAuditInputRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RunAuditInputRequest'
        required: true
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Audit'
          description: ''
  /api/v1/auth/admin/users/:
    get:
      operationId: auth_admin_users_list
      description: 'Admin-only: list/retrieve all users together with their API keys.'
      parameters:
      - in: query
        name: is_active
        schema:
          type: boolean
      - in: query
        name: is_email_verified
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: role
        schema:
          type: string
          enum:
          - admin
          - manager
          - user
        description: |-
          * `admin` - Admin
          * `manager` - Manager
          * `user` - User
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - auth
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminUserList'
          description: ''
  /api/v1/auth/admin/users/{id}/:
    get:
      operationId: auth_admin_users_retrieve
      description: 'Admin-only: list/retrieve all users together with their API keys.'
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this user.
        required: true
      tags:
      - auth
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'
          description: ''
  /api/v1/auth/email/verify/:
    post:
      operationId: auth_email_verify_create
      summary: Verify an email address with a token
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
        required: true
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          description: Email verified
  /api/v1/auth/email/verify/resend/:
    post:
      operationId: auth_email_verify_resend_create
      summary: Resend the email verification message
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendVerificationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResendVerificationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResendVerificationRequest'
        required: true
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          description: Verification email dispatched if applicable
  /api/v1/auth/login/:
    post:
      operationId: auth_login_create
      summary: Obtain JWT access & refresh tokens
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          description: access, refresh, and user
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout_create
      summary: Blacklist a refresh token (logout)
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
        required: true
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      responses:
        '205':
          description: Refresh token blacklisted
  /api/v1/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: GET / PATCH the authenticated user's own profile.
      summary: Get the current user
      tags:
      - auth
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    patch:
      operationId: auth_me_partial_update
      description: GET / PATCH the authenticated user's own profile.
      summary: Update the current user's profile
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUpdateProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUpdateProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUpdateProfileRequest'
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/v1/auth/me/api-key/:
    get:
      operationId: auth_me_api_key_retrieve
      description: GET the current user's API key; POST to rotate it.
      summary: Get my API key
      tags:
      - auth
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
          description: ''
    post:
      operationId: auth_me_api_key_create
      description: GET the current user's API key; POST to rotate it.
      summary: Rotate my API key
      tags:
      - auth
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
          description: ''
  /api/v1/auth/password/change/:
    post:
      operationId: auth_password_change_create
      summary: Change the current user's password
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      responses:
        '200':
          description: Password changed
  /api/v1/auth/password/reset/:
    post:
      operationId: auth_password_reset_create
      summary: Request a password reset email
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
        required: true
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          description: Reset email dispatched if account exists
  /api/v1/auth/password/reset/confirm/:
    post:
      operationId: auth_password_reset_confirm_create
      summary: Confirm a password reset with token
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
        required: true
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          description: Password reset
  /api/v1/auth/register/:
    post:
      operationId: auth_register_create
      summary: Register a new user
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/v1/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/crawl/:
    get:
      operationId: crawl_list
      description: Submit crawls and read jobs, link results, broken links, and progress.
      summary: List crawl jobs
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - crawl
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCrawlJobListList'
          description: ''
    post:
      operationId: crawl_create
      description: Submit crawls and read jobs, link results, broken links, and progress.
      summary: Submit a URL for link checking
      tags:
      - crawl
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitCrawlRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SubmitCrawlRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SubmitCrawlRequest'
        required: true
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrawlJob'
          description: ''
  /api/v1/crawl/{id}/:
    get:
      operationId: crawl_retrieve
      description: Submit crawls and read jobs, link results, broken links, and progress.
      summary: Get a crawl job with stats
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this crawl job.
        required: true
      tags:
      - crawl
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrawlJob'
          description: ''
  /api/v1/crawl/{id}/broken/:
    get:
      operationId: crawl_broken_retrieve
      description: Submit crawls and read jobs, link results, broken links, and progress.
      summary: Broken links only
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this crawl job.
        required: true
      tags:
      - crawl
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkResult'
          description: ''
  /api/v1/crawl/{id}/links/:
    get:
      operationId: crawl_links_retrieve
      description: Submit crawls and read jobs, link results, broken links, and progress.
      summary: All link results for a job
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this crawl job.
        required: true
      tags:
      - crawl
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkResult'
          description: ''
  /api/v1/crawl/{id}/progress/:
    get:
      operationId: crawl_progress_retrieve
      description: Submit crawls and read jobs, link results, broken links, and progress.
      summary: Crawl progress
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this crawl job.
        required: true
      tags:
      - crawl
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrawlProgress'
          description: ''
  /api/v1/credits/balance/:
    get:
      operationId: credits_balance_retrieve
      description: GET /credits/balance/ — the current user's credit balance.
      summary: Get credit balance
      tags:
      - credits
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditBalance'
          description: ''
  /api/v1/credits/purchase/:
    post:
      operationId: credits_purchase_create
      description: POST /credits/purchase/ — add credits (simulated payment).
      summary: Purchase credits (simulated)
      tags:
      - credits
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseInputRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PurchaseInputRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PurchaseInputRequest'
        required: true
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditBalance'
          description: ''
  /api/v1/credits/transactions/:
    get:
      operationId: credits_transactions_list
      description: GET /credits/transactions/ — the user's credit ledger.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - credits
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCreditTransactionList'
          description: ''
  /api/v1/full_report/:
    post:
      operationId: full_report_create
      description: POST /full_report/ — queue a combined report; returns a job + status
        URL.
      summary: Queue a combined PDF report (async)
      tags:
      - full_report
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FullReportInputRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/FullReportInputRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FullReportInputRequest'
        required: true
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '202':
          description: 'Job queued: id, status, status_url'
  /api/v1/full_report/{id}/:
    get:
      operationId: full_report_retrieve
      description: GET /full_report/{id}/ — poll job status; download_url appears
        when ready.
      summary: Get report job status
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - full_report
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FullReport'
          description: ''
  /api/v1/google_speed/analyze/:
    post:
      operationId: google_speed_analyze_create
      description: POST /analysis/analyze/ — submit a URL for async PageSpeed analysis.
      summary: Submit a URL for analysis
      tags:
      - google_speed
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeInputRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AnalyzeInputRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AnalyzeInputRequest'
        required: true
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisReport'
          description: ''
  /api/v1/google_speed/history/:
    get:
      operationId: google_speed_history_list
      description: GET /analysis/history/ — unique analyzed URLs with counts (cached
        5 min).
      summary: List analysis history
      tags:
      - google_speed
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AnalysisHistory'
          description: ''
  /api/v1/google_speed/reports/:
    get:
      operationId: google_speed_reports_list
      description: List / retrieve / soft-delete the authenticated user's reports.
      parameters:
      - in: query
        name: created_after
        schema:
          type: string
          format: date-time
      - in: query
        name: created_before
        schema:
          type: string
          format: date-time
      - in: query
        name: max_performance
        schema:
          type: integer
      - in: query
        name: max_seo
        schema:
          type: integer
      - in: query
        name: min_accessibility
        schema:
