openapi: 3.0.3
info:
  title: PageSpeed Analyzer API
  version: 1.0.0
  description: Website performance analysis via the Google PageSpeed Insights API.
paths:
  /api/v1/auth/admin/users/:
    get:
      operationId: auth_admin_users_list
      description: 'Admin-only: list/retrieve all users together with their API keys.'
      parameters:
      - in: query
        name: is_active
        schema:
          type: boolean
      - in: query
        name: is_email_verified
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: role
        schema:
          type: string
          enum:
          - admin
          - manager
          - user
        description: |-
          * `admin` - Admin
          * `manager` - Manager
          * `user` - User
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminUserList'
          description: ''
  /api/v1/auth/admin/users/{id}/:
    get:
      operationId: auth_admin_users_retrieve
      description: 'Admin-only: list/retrieve all users together with their API keys.'
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this user.
        required: true
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'
          description: ''
  /api/v1/auth/email/verify/:
    post:
      operationId: auth_email_verify_create
      summary: Verify an email address with a token
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: Email verified
  /api/v1/auth/email/verify/resend/:
    post:
      operationId: auth_email_verify_resend_create
      summary: Resend the email verification message
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendVerificationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResendVerificationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResendVerificationRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: Verification email dispatched if applicable
  /api/v1/auth/login/:
    post:
      operationId: auth_login_create
      summary: Obtain JWT access & refresh tokens
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: access, refresh, and user
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout_create
      summary: Blacklist a refresh token (logout)
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '205':
          description: Refresh token blacklisted
  /api/v1/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: GET / PATCH the authenticated user's own profile.
      summary: Get the current user
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    patch:
      operationId: auth_me_partial_update
      description: GET / PATCH the authenticated user's own profile.
      summary: Update the current user's profile
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUpdateProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUpdateProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUpdateProfileRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/v1/auth/me/api-key/:
    get:
      operationId: auth_me_api_key_retrieve
      description: GET the current user's API key; POST to rotate it.
      summary: Get my API key
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
          description: ''
    post:
      operationId: auth_me_api_key_create
      description: GET the current user's API key; POST to rotate it.
      summary: Rotate my API key
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
          description: ''
  /api/v1/auth/password/change/:
    post:
      operationId: auth_password_change_create
      summary: Change the current user's password
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          description: Password changed
  /api/v1/auth/password/reset/:
    post:
      operationId: auth_password_reset_create
      summary: Request a password reset email
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: Reset email dispatched if account exists
  /api/v1/auth/password/reset/confirm/:
    post:
      operationId: auth_password_reset_confirm_create
      summary: Confirm a password reset with token
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: Password reset
  /api/v1/auth/register/:
    post:
      operationId: auth_register_create
      summary: Register a new user
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/v1/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/google_speed/analyze/:
    post:
      operationId: google_speed_analyze_create
      description: POST /analysis/analyze/ — submit a URL for async PageSpeed analysis.
      summary: Submit a URL for analysis
      tags:
      - google_speed
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeInputRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AnalyzeInputRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AnalyzeInputRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisReport'
          description: ''
  /api/v1/google_speed/history/:
    get:
      operationId: google_speed_history_list
      description: GET /analysis/history/ — unique analyzed URLs with counts (cached
        5 min).
      summary: List analysis history
      tags:
      - google_speed
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AnalysisHistory'
          description: ''
  /api/v1/google_speed/reports/:
    get:
      operationId: google_speed_reports_list
      description: List / retrieve / soft-delete the authenticated user's reports.
      parameters:
      - in: query
        name: created_after
        schema:
          type: string
          format: date-time
      - in: query
        name: created_before
        schema:
          type: string
          format: date-time
      - in: query
        name: max_performance
        schema:
          type: integer
      - in: query
        name: max_seo
        schema:
          type: integer
      - in: query
        name: min_accessibility
        schema:
          type: integer
      - in: query
        name: min_best_practices
        schema:
          type: integer
      - in: query
        name: min_performance
        schema:
          type: integer
      - in: query
        name: min_seo
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: string
          enum:
          - completed
          - failed
          - pending
        description: |-
          * `pending` - Pending
          * `completed` - Completed
          * `failed` - Failed
      - in: query
        name: strategy
        schema:
          type: string
          enum:
          - desktop
          - mobile
        description: |-
          * `mobile` - Mobile
          * `desktop` - Desktop
      - in: query
        name: url
        schema:
          type: string
      tags:
      - google_speed
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAnalysisReportListList'
          description: ''
  /api/v1/google_speed/reports/{id}/:
    get:
      operationId: google_speed_reports_retrieve
      description: List / retrieve / soft-delete the authenticated user's reports.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this analysis report.
        required: true
      tags:
      - google_speed
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisReport'
          description: ''
    delete:
      operationId: google_speed_reports_destroy
      description: List / retrieve / soft-delete the authenticated user's reports.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this analysis report.
        required: true
      tags:
      - google_speed
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
components:
  schemas:
    AdminUser:
      type: object
      description: User representation for admins, including the user's API key.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        username:
          type: string
          readOnly: true
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
        email:
          type: string
          format: email
          readOnly: true
          title: Email address
        first_name:
          type: string
          readOnly: true
        last_name:
          type: string
          readOnly: true
        full_name:
          type: string
          readOnly: true
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
          title: Active
          description: Inactive accounts cannot authenticate.
        is_staff:
          type: boolean
          readOnly: true
          title: Staff status
        is_email_verified:
          type: boolean
          readOnly: true
          title: Email verified
        api_key:
          allOf:
          - $ref: '#/components/schemas/ApiKey'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - api_key
      - created_at
      - email
      - first_name
      - full_name
      - id
      - is_active
      - is_email_verified
      - is_staff
      - last_name
      - role
      - username
    AnalysisHistory:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        url:
          type: string
          format: uri
          readOnly: true
        reports_count:
          type: integer
          readOnly: true
        last_analyzed_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - id
      - last_analyzed_at
      - reports_count
      - url
    AnalysisReport:
      type: object
      description: Full report detail (includes raw_response).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        url:
          type: string
          format: uri
          readOnly: true
        strategy:
          allOf:
          - $ref: '#/components/schemas/StrategyEnum'
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        error_message:
          type: string
          readOnly: true
        performance_score:
          type: integer
          readOnly: true
          nullable: true
        accessibility_score:
          type: integer
          readOnly: true
          nullable: true
        best_practices_score:
          type: integer
          readOnly: true
          nullable: true
        seo_score:
          type: integer
          readOnly: true
          nullable: true
        first_contentful_paint:
          type: number
          format: double
          readOnly: true
          nullable: true
          description: seconds
        largest_contentful_paint:
          type: number
          format: double
          readOnly: true
          nullable: true
          description: seconds
        total_blocking_time:
          type: number
          format: double
          readOnly: true
          nullable: true
          description: milliseconds
        cumulative_layout_shift:
          type: number
          format: double
          readOnly: true
          nullable: true
          description: unitless
        speed_index:
          type: number
          format: double
          readOnly: true
          nullable: true
          description: seconds
        time_to_interactive:
          type: number
          format: double
          readOnly: true
          nullable: true
          description: seconds
        raw_response:
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - accessibility_score
      - best_practices_score
      - created_at
      - cumulative_layout_shift
      - error_message
      - first_contentful_paint
      - id
      - largest_contentful_paint
      - performance_score
      - raw_response
      - seo_score
      - speed_index
      - status
      - strategy
      - time_to_interactive
      - total_blocking_time
      - updated_at
      - url
    AnalysisReportList:
      type: object
      description: Compact report representation for list endpoints (no raw_response).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        url:
          type: string
          format: uri
          readOnly: true
        strategy:
          allOf:
          - $ref: '#/components/schemas/StrategyEnum'
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        performance_score:
          type: integer
          readOnly: true
          nullable: true
        accessibility_score:
          type: integer
          readOnly: true
          nullable: true
        best_practices_score:
          type: integer
          readOnly: true
          nullable: true
        seo_score:
          type: integer
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - accessibility_score
      - best_practices_score
      - created_at
      - id
      - performance_score
      - seo_score
      - status
      - strategy
      - url
    AnalyzeInputRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
          minLength: 1
          maxLength: 2048
        strategy:
          allOf:
          - $ref: '#/components/schemas/StrategyEnum'
          default: mobile
      required:
      - url
    ApiKey:
      type: object
      description: Full API key — returned to the key's owner and to admins.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        key:
          type: string
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
        last_used_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - is_active
      - key
      - last_used_at
    ChangePasswordRequest:
      type: object
      properties:
        current_password:
          type: string
          writeOnly: true
          minLength: 1
        new_password:
          type: string
          writeOnly: true
          minLength: 8
        new_password_confirm:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - current_password
      - new_password
      - new_password_confirm
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - email
      - password
    LogoutRequest:
      type: object
      properties:
        refresh:
          type: string
          minLength: 1
      required:
      - refresh
    PaginatedAdminUserList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/AdminUser'
    PaginatedAnalysisReportListList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/AnalysisReportList'
    PasswordResetConfirmRequest:
      type: object
      properties:
        uid:
          type: string
          minLength: 1
        token:
          type: string
          minLength: 1
        new_password:
          type: string
          writeOnly: true
          minLength: 8
        new_password_confirm:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - new_password
      - new_password_confirm
      - token
      - uid
    PasswordResetRequestRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
      required:
      - email
    PatchedUpdateProfileRequest:
      type: object
      description: Input serializer for PATCH /auth/me/ — only mutable profile fields.
      properties:
        first_name:
          type: string
          minLength: 1
          maxLength: 150
        last_name:
          type: string
          minLength: 1
          maxLength: 150
    RegisterRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 150
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 8
        password_confirm:
          type: string
          writeOnly: true
          minLength: 1
        first_name:
          type: string
          minLength: 1
          maxLength: 150
        last_name:
          type: string
          minLength: 1
          maxLength: 150
      required:
      - email
      - first_name
      - last_name
      - password
      - password_confirm
      - username
    ResendVerificationRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
      required:
      - email
    RoleEnum:
      enum:
      - admin
      - manager
      - user
      type: string
      description: |-
        * `admin` - Admin
        * `manager` - Manager
        * `user` - User
    StatusEnum:
      enum:
      - pending
      - completed
      - failed
      type: string
      description: |-
        * `pending` - Pending
        * `completed` - Completed
        * `failed` - Failed
    StrategyEnum:
      enum:
      - mobile
      - desktop
      type: string
      description: |-
        * `mobile` - Mobile
        * `desktop` - Desktop
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    TokenRefreshRequest:
      type: object
      properties:
        refresh:
          type: string
          minLength: 1
      required:
      - refresh
    User:
      type: object
      description: Public-facing representation of a user (output only).
      properties:
        id:
          type: string
          format: uuid
