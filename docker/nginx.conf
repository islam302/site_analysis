upstream django_api {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    # Allow report/file uploads and large JSON bodies.
    client_max_body_size 10m;

    # Static files (collected by the api container into the shared volume).
    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 7d;
    }

    # Generated media (PDF reports written by the Celery worker).
    location /media/ {
        alias /app/media/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://django_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 120s;
    }
}
